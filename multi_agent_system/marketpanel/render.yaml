
services:
  - type: web
    name: marketpanel
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -w 2 -k gthread -b 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: change-me
      - key: BASE_URL
        value: https://your-render-subdomain.onrender.com
